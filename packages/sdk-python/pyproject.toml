[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "atlas-synapse"
version = "0.2.0"
description = "Monitor AI agents with Atlas Synapse — trace, evaluate, alert"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27",
]

[project.optional-dependencies]
anthropic = [
    "anthropic>=0.49",
]
langchain = [
    "langchain-core>=0.2",
]
openai = [
    "openai>=1.0",
]
crewai = [
    "crewai>=0.51",
]
llamaindex = [
    "llama-index-core>=0.10",
]
autogen = [
    "pyautogen>=0.2",
]
autogen4 = [
    "autogen-agentchat>=0.4",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "anthropic>=0.49",
]

[project.urls]
Homepage = "https://atlassynapse.ai"
Repository = "https://github.com/atlassynapseai/MVP"

[tool.hatch.build.targets.wheel]
packages = ["src/atlas_synapse"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
# Run as: PYTHONPATH=src python3 -m pytest tests/
